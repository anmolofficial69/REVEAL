<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reveal — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#b8dff7 0%,#d6eeff 35%,#f0f8ff 65%,#dceeff 100%);
  background-attachment:fixed;
  color:#1a3550;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(100,180,255,0.25) 0%,transparent 60%),
              radial-gradient(ellipse at 80% 80%,rgba(150,200,255,0.18) 0%,transparent 60%);
  pointer-events:none;
}
.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;margin:24px;
  padding:40px 36px;
  border-radius:28px;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  border:1px solid rgba(255,255,255,0.75);
  box-shadow:0 8px 32px rgba(30,80,140,0.13),0 2px 8px rgba(30,80,140,0.08),inset 0 1px 0 rgba(255,255,255,0.85);
}
.brand{font-size:1.8rem;font-weight:600;letter-spacing:-0.03em;margin-bottom:4px;}
.brand span{color:#2e7de9;}
.sub{font-size:.9rem;color:#3a6080;margin-bottom:28px;}
.tabs{display:flex;gap:4px;margin-bottom:26px;padding:4px;background:rgba(180,210,240,0.25);border-radius:12px;border:1px solid rgba(255,255,255,0.5);}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:9px;font-size:.88rem;font-weight:500;color:#6a8faf;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.tab.active{background:rgba(255,255,255,0.7);color:#2e7de9;box-shadow:0 2px 8px rgba(30,80,140,0.10);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.75rem;font-weight:600;color:#3a6080;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.field input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.65);
  border-radius:12px;font-size:.95rem;color:#1a3550;
  outline:none;transition:all .2s;font-family:'Inter',sans-serif;
  box-shadow:inset 0 1px 3px rgba(30,80,140,0.06);
  backdrop-filter:blur(8px);
}
.field input:focus{
  background:rgba(255,255,255,0.65);
  border-color:rgba(46,125,233,0.5);
  box-shadow:0 0 0 3px rgba(46,125,233,0.12),inset 0 1px 3px rgba(30,80,140,0.04);
}
.field input::placeholder{color:#6a8faf;}
.err{
  background:rgba(224,60,60,0.1);border:1px solid rgba(224,60,60,0.25);
  color:#c02020;border-radius:10px;padding:10px 14px;font-size:.85rem;
  margin-bottom:16px;display:none;
}
.btn{
  width:100%;padding:13px;border-radius:14px;
  background:linear-gradient(135deg,#2e7de9 0%,#1a5cbf 100%);
  border:none;color:#fff;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:all .25s;margin-top:4px;
  box-shadow:0 4px 16px rgba(46,125,233,0.35);
  letter-spacing:.01em;font-family:'Inter',sans-serif;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(46,125,233,0.42);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">re<span>veal</span></div>
  <div class="sub">Share what's on your mind.</div>
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
    <button class="tab" id="tab-reg" onclick="switchTab('register')">Register</button>
  </div>
  <div class="err" id="err"></div>
  <div class="field"><label>Username</label><input id="username" type="text" placeholder="your username" autocomplete="username"/></div>
  <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <button class="btn" id="btn" onclick="submit()">Sign in</button>
</div>

<script>
const API="https://reveal-sp4v.onrender.com";
let mode="login";

// if already logged in, go straight to feed
if(localStorage.getItem("rv_token")){
  try{
    const p=JSON.parse(atob(localStorage.getItem("rv_token").split(".")[1]));
    if(p.exp*1000>Date.now()) window.location.href="feed.html";
  }catch{localStorage.removeItem("rv_token");}
}

function switchTab(m){
  mode=m;
  document.getElementById("tab-login").classList.toggle("active",m==="login");
  document.getElementById("tab-reg").classList.toggle("active",m==="register");
  document.getElementById("btn").textContent=m==="login"?"Sign in":"Create account";
  document.getElementById("err").style.display="none";
}

async function submit(){
  const u=document.getElementById("username").value.trim();
  const p=document.getElementById("password").value;
  if(!u||!p){showErr("Fill in all fields.");return;}
  const btn=document.getElementById("btn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    const r=await fetch(API+(mode==="login"?"/login":"/register"),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:u,password:p})
    });
    const d=await r.json();
    if(!r.ok){showErr(d.detail||"Something went wrong.");return;}
    if(mode==="register"){
      showErr("Account created! Sign in now.");
      document.getElementById("err").style.background="rgba(27,167,106,0.1)";
      document.getElementById("err").style.borderColor="rgba(27,167,106,0.3)";
      document.getElementById("err").style.color="#0f6e56";
      document.getElementById("err").style.display="block";
      switchTab("login");
      document.getElementById("password").value="";
    }else{
      localStorage.setItem("rv_token",d.token);
      window.location.href="feed.html";
    }
  }catch{showErr("Cannot reach server. Is FastAPI running?");}
  finally{btn.disabled=false;btn.textContent=mode==="login"?"Sign in":"Create account";}
}

function showErr(msg){
  const e=document.getElementById("err");
  e.style.background="rgba(224,60,60,0.1)";
  e.style.borderColor="rgba(224,60,60,0.25)";
  e.style.color="#c02020";
  e.textContent=msg;e.style.display="block";
}

document.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
</script>
</body>
</html>
